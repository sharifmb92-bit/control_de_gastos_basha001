<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Control de Gastos</title>
    <style>
        body { font-family: sans-serif; background-color: #2c2c2c; color: #e0e0e0; margin: 0; padding: 15px; }
        .header { background: #3d3d3d; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .balance { font-size: 2em; font-weight: bold; color: #4caf50; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #4a4a4a; border: none; color: white; padding: 15px; border-radius: 10px; font-size: 1em; cursor: pointer; }
        button:active { background: #666; }
        .online { border-bottom: 3px solid #ff9800; }
        .motor { border-bottom: 3px solid #2196f3; }
        .history { margin-top: 30px; background: #3d3d3d; border-radius: 15px; padding: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #555; }
        .input-group { margin-top: 20px; }
        input { width: 90%; padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div>SALDO ESTIMADO</div>
        <div class="balance" id="total">0.00 €</div>
    </div>

    <div class="input-group">
        <input type="number" id="monto" placeholder="Importe €" step="0.01">
    </div>

    <div class="grid">
        <button onclick="addGasto('☕ Diario')">☕ Diario</button>
        <button class="online" onclick="addGasto('📦 Online')">📦 Online</button>
        <button class="motor" onclick="addGasto('🔧 Mecánico')">🔧 Mecánico</button>
        <button class="motor" onclick="addGasto('⛽ Gasolina')">⛽ Gasolina</button>
        <button onclick="addGasto('💸 Familia')">💸 Familia</button>
        <button onclick="addGasto('👦 Niños')">👦 Niños</button>
        <button onclick="addGasto('📡 Tlf/Int')">📡 Tlf/Int</button>
        <button onclick="addGasto('🏛️ Ayto')">🏛️ Ayto</button>
    </div>

    <div class="history">
        <h3>Últimos Gastos</h3>
        <table id="tabla-gastos">
            <tr><th>Concepto</th><th>Importe</th></tr>
        </table>
    </div>

    <script>
        let total = 0;
        function addGasto(tipo) {
            const montoInput = document.getElementById('monto');
            const monto = parseFloat(montoInput.value);
            if (isNaN(monto)) { alert("Pon un importe primero"); return; }
            
            total += monto;
            document.getElementById('total').innerText = total.toFixed(2) + " €";
            
            const tabla = document.getElementById('tabla-gastos');
            const fila = tabla.insertRow(1);
            fila.insertCell(0).innerText = tipo;
            fila.insertCell(1).innerText = "-" + monto.toFixed(2) + " €";
            
            montoInput.value = "";
        }
    </script>
</body>
</html>
